apiVersion: v1
kind: Service
metadata:
  name: maya-agent
  namespace: maya
  labels:
    app: maya-agent
spec:
  selector:
    app: maya-agent
  ports:
  - name: http
    port: 80
    targetPort: 5050
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maya-data-pvc
  namespace: maya
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

